<!DOCTYPE html>
<html>
<head>
  <title>Areca Robot Control</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    /* MODE BUTTONS */
    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #1e90ff;
      color: white;
    }

    /* JOYSTICK AREA */
    #joystickContainer {
      width: 260px;
      height: 260px;
      margin: 40px auto;
      position: relative;
    }

    /* OUTER CIRCLE */
    #joystick {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.2);
      position: relative;
    }

    /* ARROWS (visual only) */
    .arrow {
      position: absolute;
      color: rgba(255,255,255,0.4);
      font-size: 20px;
    }

    .up    { top: 10px; left: 50%; transform: translateX(-50%); }
    .down  { bottom: 10px; left: 50%; transform: translateX(-50%); }
    .left  { left: 10px; top: 50%; transform: translateY(-50%); }
    .right { right: 10px; top: 50%; transform: translateY(-50%); }

    /* STICK */
    #stick {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 50%;
      position: absolute;
      left: 90px;
      top: 90px;
      transition: 0.1s;
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🌴 Areca Harvest Robot</h1>

<h2>Mode</h2>
<button onclick="setMode('manual')">Manual</button>
<button onclick="setMode('auto')">Auto</button>

<div id="joystickContainer">
  <div id="joystick">

    <!-- ARROWS -->
    <div class="arrow up">▲</div>
    <div class="arrow down">▼</div>
    <div class="arrow left">◀</div>
    <div class="arrow right">▶</div>

    <!-- STICK -->
    <div id="stick"></div>

  </div>
</div>

<div id="status">Checking...</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "areca-robot.firebaseapp.com",
  databaseURL: "https://areca-robot-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "areca-robot"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let active = false;

// START TOUCH / CLICK
joystick.addEventListener("mousedown", () => active = true);
joystick.addEventListener("touchstart", () => active = true);

// STOP TOUCH
document.addEventListener("mouseup", stopControl);
document.addEventListener("touchend", stopControl);

function stopControl() {
  active = false;

  // RETURN TO CENTER
  stick.style.left = "90px";
  stick.style.top = "90px";

  sendXY(0, 0); // STOP
}

// MOVE
document.addEventListener("mousemove", moveStick);
document.addEventListener("touchmove", moveStick);

function moveStick(e) {
  if (!active) return;

  const rect = joystick.getBoundingClientRect();

  let clientX = e.touches ? e.touches[0].clientX : e.clientX;
  let clientY = e.touches ? e.touches[0].clientY : e.clientY;

  let dx = clientX - rect.left - 130;
  let dy = clientY - rect.top - 130;

  let dist = Math.sqrt(dx * dx + dy * dy);
  let max = 100;

  // LIMIT MOVEMENT INSIDE CIRCLE
  if (dist > max) {
    dx = dx * max / dist;
    dy = dy * max / dist;
  }

  let x = dx / max;
  let y = -dy / max;

  // MOVE STICK
  stick.style.left = (dx + 130 - 40) + "px";
  stick.style.top = (dy + 130 - 40) + "px";

  sendXY(x, y);
}

// SEND TO FIREBASE
function sendXY(x, y) {
  db.ref("robot").update({
    x: x,
    y: y
  });
}

// MODE
function setMode(mode) {
  db.ref("robot/mode").set(mode);
}

// STATUS
db.ref("robot").on("value", (snap) => {
  const data = snap.val() || {};
  const now = Date.now();
  const lastSeen = data.lastSeen || 0;

  let online = (now - lastSeen < 4000);

  document.getElementById("status").innerHTML =
    (online ? "🟢 ONLINE" : "🔴 OFFLINE") +
    "<br>Mode: " + (data.mode || "unknown");
});
</script>

</body>
</html>
