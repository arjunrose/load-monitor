<!DOCTYPE html>
<html>
<head>
  <title>Areca Robot Control</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #joystick {
      width: 220px;
      height: 220px;
      background: #333;
      border-radius: 50%;
      margin: 30px auto;
      position: relative;
    }

    #stick {
      width: 80px;
      height: 80px;
      background: #aaa;
      border-radius: 50%;
      position: absolute;
      left: 70px;
      top: 70px;
    }

    #status {
      font-size: 22px;
    }
  </style>
</head>

<body>

<h1>🌴 Areca Harvest Robot</h1>

<div id="joystick">
  <div id="stick"></div>
</div>

<div id="status">Checking...</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "areca-robot.firebaseapp.com",
  databaseURL: "https://areca-robot-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "areca-robot"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const joy = document.getElementById("joystick");
const stick = document.getElementById("stick");

let dragging = false;

joy.addEventListener("mousedown", () => dragging = true);
document.addEventListener("mouseup", () => {
  dragging = false;
  resetStick();
});

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const rect = joy.getBoundingClientRect();

  let dx = e.clientX - rect.left - 110;
  let dy = e.clientY - rect.top - 110;

  let x = dx / 100;
  let y = -dy / 100;

  x = Math.max(-1, Math.min(1, x));
  y = Math.max(-1, Math.min(1, y));

  stick.style.left = (dx + 110 - 40) + "px";
  stick.style.top = (dy + 110 - 40) + "px";

  sendXY(x, y);
});

function resetStick() {
  stick.style.left = "70px";
  stick.style.top = "70px";
  sendXY(0, 0);
}

function sendXY(x, y) {
  db.ref("robot").update({
    x: x,
    y: y
  });
}

// STATUS
db.ref("robot").on("value", (snap) => {
  const data = snap.val() || {};

  const now = Date.now();
  const lastSeen = data.lastSeen || 0;

  let online = (now - lastSeen < 4000);

  document.getElementById("status").innerHTML =
    (online ? "🟢 ONLINE" : "🔴 OFFLINE");
});
</script>

</body>
</html>
