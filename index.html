<!DOCTYPE html>
<html>
<head>
  <title>Areca Robot Control</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      touch-action: manipulation; /* Prevents double-tap zooming */
    }

    .top-btn {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #1e90ff;
      color: white;
    }

    #harvestBtn {
      background: #28a745;
      font-weight: bold;
    }

    /* 8-WAY D-PAD GRID */
    .dpad-container {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 15px;
      justify-content: center;
      margin: 40px auto;
    }

    .dir-btn {
      background: #333;
      color: white;
      border: 2px solid #555;
      border-radius: 12px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none; /* Prevents text highlighting on hold */
      -webkit-user-select: none;
    }

    .dir-btn:active, .dir-btn.active-touch {
      background: #1e90ff;
      border-color: #fff;
      transform: scale(0.95);
    }

    .empty-center {
      background: transparent;
      border: none;
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🌴 Areca Harvest Robot</h1>

<h2>Mode</h2>
<button class="top-btn" onclick="setMode('manual')">Manual</button>
<button class="top-btn" onclick="setMode('auto')">Auto</button>

<h2>Action</h2>
<button class="top-btn" id="harvestBtn" onclick="harvest()">🌴 Harvest</button>

<div class="dpad-container">
  <button class="dir-btn" onmousedown="press(-1, 1)" onmouseup="release()" onmouseleave="release()" ontouchstart="tPress(event, -1, 1)" ontouchend="release()">↖</button>
  <button class="dir-btn" onmousedown="press(0, 1)" onmouseup="release()" onmouseleave="release()" ontouchstart="tPress(event, 0, 1)" ontouchend="release()">▲</button>
  <button class="dir-btn" onmousedown="press(1, 1)" onmouseup="release()" onmouseleave="release()" ontouchstart="tPress(event, 1, 1)" ontouchend="release()">↗</button>

  <button class="dir-btn" onmousedown="press(-1, 0)" onmouseup="release()" onmouseleave="release()" ontouchstart="tPress(event, -1, 0)" ontouchend="release()">◀</button>
  <div class="empty-center"></div> <button class="dir-btn" onmousedown="press(1, 0)" onmouseup="release()" onmouseleave="release()" ontouchstart="tPress(event, 1, 0)" ontouchend="release()">▶</button>

  <button class="dir-btn" onmousedown="press(-1, -1)" onmouseup="release()" onmouseleave="release()" ontouchstart="tPress(event, -1, -1)" ontouchend="release()">↙</button>
  <button class="dir-btn" onmousedown="press(0, -1)" onmouseup="release()" onmouseleave="release()" ontouchstart="tPress(event, 0, -1)" ontouchend="release()">▼</button>
  <button class="dir-btn" onmousedown="press(1, -1)" onmouseup="release()" onmouseleave="release()" ontouchstart="tPress(event, 1, -1)" ontouchend="release()">↘</button>
</div>

<div id="status">Connecting...</div>

<script>
// 🔥 REPLACE THIS WITH YOUR REAL CONFIG
const firebaseConfig = {
  apiKey: "YOUR_REAL_API_KEY",
  authDomain: "areca-robot.firebaseapp.com",
  databaseURL: "https://areca-robot-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "areca-robot",
  storageBucket: "areca-robot.appspot.com",
  messagingSenderId: "897521287655",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- DRIVE CONTROLS ---
let isSending = false;

function press(x, y) {
  if (isSending) return; // Prevent double firing
  isSending = true;
  db.ref("robot").update({ x: x, y: y });
}

// Separate function for touch to prevent screen scrolling while holding
function tPress(event, x, y) {
  event.preventDefault(); 
  event.target.classList.add("active-touch"); // Manual visual feedback for touch
  press(x, y);
}

function release(event) {
  if (!isSending) return;
  isSending = false;
  
  // Clear visual touch states
  document.querySelectorAll('.dir-btn').forEach(btn => btn.classList.remove("active-touch"));
  
  // Send hard stop
  db.ref("robot").update({ x: 0, y: 0 });
}

// Ensure lifting finger anywhere stops the robot
document.addEventListener("mouseup", release);
document.addEventListener("touchend", release);

// --- ACTIONS ---
function harvest() {
  console.log("Harvest clicked");
  db.ref("robot/harvest").set(1);
  setTimeout(() => { db.ref("robot/harvest").set(0); }, 800);
}

function setMode(mode) {
  db.ref("robot/mode").set(mode);
}

// --- STATUS ---
db.ref("robot").on("value", (snap) => {
  const data = snap.val() || {};
  let online = false;

  if (data.lastSeen) {
    let diff = Date.now() - data.lastSeen;
    online = diff < 15000; // 15 sec window
  }

  document.getElementById("status").innerHTML =
    (online ? "🟢 ONLINE" : "🔴 OFFLINE") +
    "<br>Mode: " + (data.mode || "unknown");
});

</script>
</body>
</html>
