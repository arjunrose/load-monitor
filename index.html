<!DOCTYPE html>
<html>
<head>
  <title>Areca Robot Control</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #1e90ff;
      color: white;
    }

    #joystickContainer {
      width: 260px;
      height: 260px;
      margin: 40px auto;
      position: relative;
    }

    #joystick {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.2);
      position: relative;
    }

    .arrow {
      position: absolute;
      color: rgba(255,255,255,0.4);
      font-size: 20px;
    }

    .up    { top: 10px; left: 50%; transform: translateX(-50%); }
    .down  { bottom: 10px; left: 50%; transform: translateX(-50%); }
    .left  { left: 10px; top: 50%; transform: translateY(-50%); }
    .right { right: 10px; top: 50%; transform: translateY(-50%); }

    #stick {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 50%;
      position: absolute;
      left: 90px;
      top: 90px;
      transition: 0.05s;
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🌴 Areca Harvest Robot</h1>

<h2>Mode</h2>
<button onclick="setMode('manual')">Manual</button>
<button onclick="setMode('auto')">Auto</button>

<h2>Action</h2>
<button onclick="harvest()">🌴 Harvest</button>

<div id="joystickContainer">
  <div id="joystick">

    <div class="arrow up">▲</div>
    <div class="arrow down">▼</div>
    <div class="arrow left">◀</div>
    <div class="arrow right">▶</div>

    <div id="stick"></div>

  </div>
</div>

<div id="status">Connecting...</div>

<script>

// 🔥 REPLACE THIS WITH YOUR REAL CONFIG
const firebaseConfig = {
  apiKey: "YOUR_REAL_API_KEY",
  authDomain: "areca-robot.firebaseapp.com",
  databaseURL: "https://areca-robot-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "areca-robot",
  storageBucket: "areca-robot.appspot.com",
  messagingSenderId: "897521287655",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let active = false;

// START
joystick.addEventListener("mousedown", () => active = true);
joystick.addEventListener("touchstart", () => active = true);

// STOP
document.addEventListener("mouseup", stopControl);
document.addEventListener("touchend", stopControl);

function stopControl() {
  active = false;
  stick.style.left = "90px";
  stick.style.top = "90px";
  sendXY(0, 0);
}

// MOVE
document.addEventListener("mousemove", moveStick);
document.addEventListener("touchmove", moveStick);

function moveStick(e) {
  if (!active) return;

  const rect = joystick.getBoundingClientRect();

  let clientX = e.touches ? e.touches[0].clientX : e.clientX;
  let clientY = e.touches ? e.touches[0].clientY : e.clientY;

  let dx = clientX - rect.left - 130;
  let dy = clientY - rect.top - 130;

  let dist = Math.sqrt(dx * dx + dy * dy);
  let max = 100;

  if (dist > max) {
    dx = dx * max / dist;
    dy = dy * max / dist;
  }

  let x = dx / max;
  let y = -dy / max;

  stick.style.left = (dx + 130 - 40) + "px";
  stick.style.top = (dy + 130 - 40) + "px";

  sendXY(x, y);
}

// SEND XY
function sendXY(x, y) {
  db.ref("robot").update({ x: x, y: y });
}

// 🌴 HARVEST BUTTON
function harvest() {
  console.log("Harvest clicked");

  db.ref("robot/harvest").set(1);

  setTimeout(() => {
    db.ref("robot/harvest").set(0);
  }, 800);
}

// MODE
function setMode(mode) {
  db.ref("robot/mode").set(mode);
}

// 🔥 STATUS (FIXED)
db.ref("robot").on("value", (snap) => {

  const data = snap.val() || {};
  console.log("Firebase Data:", data);

  let online = false;

  if (data.lastSeen) {
    let diff = Date.now() - data.lastSeen;
    console.log("Time diff:", diff);
    online = diff < 15000; // 15 sec window
  }

  document.getElementById("status").innerHTML =
    (online ? "🟢 ONLINE" : "🔴 OFFLINE") +
    "<br>Mode: " + (data.mode || "unknown");

});

</script>

</body>
</html>
