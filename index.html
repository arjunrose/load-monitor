<!DOCTYPE html>
<html>
<head>
  <title>Areca Robot Control</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .green { background: green; }
    .red { background: red; }
    .orange { background: orange; }
    .blue { background: blue; }

    #status {
      font-size: 22px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🌴 Areca Harvest Robot</h1>

<h2>Mode</h2>
<button class="blue" onclick="setMode('manual')">Manual</button>
<button class="blue" onclick="setMode('auto')">Auto</button>

<h2>Movement</h2>
<button class="green" onclick="sendCommand('forward')">⬆ Forward</button><br>
<button class="orange" onclick="sendCommand('stop')">⏹ Stop</button><br>
<button class="red" onclick="sendCommand('backward')">⬇ Backward</button>

<div id="status">Checking...</div>

<script>
  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "areca-robot.firebaseapp.com",
    databaseURL: "https://areca-robot-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "areca-robot"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // SEND COMMAND
  function sendCommand(cmd) {
    db.ref("robot/command").set(cmd);
  }

  // SET MODE
  function setMode(mode) {
    db.ref("robot/mode").set(mode);
  }

  // STATUS LISTENER
  db.ref("robot").on("value", (snap) => {
    const data = snap.val() || {};

    const now = Date.now();
    const lastSeen = data.lastSeen || 0;

    let online = (now - lastSeen < 4000);

    let statusText = online ? "🟢 ONLINE" : "🔴 OFFLINE";

    document.getElementById("status").innerHTML =
      statusText + "<br>Mode: " + (data.mode || "unknown");
  });
</script>

</body>
</html>
